<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPNS Math Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ CPNS Math Trainer ⚡</h1>
        <p class="subtitle">Latih kecepatan berhitung untuk Tes TIU CPNS</p>

        <div id="menu-screen" class="screen active">
            <h3>Pilih Operasi Matematika:</h3>
            <div class="menu-grid">
                <button class="btn-menu" onclick="startGame('tambah')">➕ Penjumlahan</button>
                <button class="btn-menu" onclick="startGame('kurang')">➖ Pengurangan</button>
                <button class="btn-menu" onclick="startGame('kali')">✖️ Perkalian</button>
                <button class="btn-menu" onclick="startGame('bagi')">➗ Pembagian</button>
                <button class="btn-menu btn-mix" onclick="startGame('campur')">🔀 Campuran</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="info-box">Soal: <span id="question-count">1</span>/10</div>
                <div class="info-box">Skor: <span id="score">0</span></div>
            </div>
            
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <div class="question-box">
                <span id="question-text">0 + 0</span> = ?
            </div>

            <div id="options-grid" class="options-grid">
                </div>

            <div id="feedback" class="feedback"></div>
        </div>

        <div id="result-screen" class="screen">
            <h2>Selesai! 🎉</h2>
            <div class="result-box">
                <p>Skor Akhir Kamu:</p>
                <h1 id="final-score">0</h1>
                <p id="evaluation-text"></p>
            </div>
            <button class="btn-action" onclick="backToMenu()">Main Lagi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
