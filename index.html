<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPNS Math Trainer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ CPNS Math Trainer Pro ⚡</h1>
        <p class="subtitle">Simulasi Akurasi & Kecepatan TIU CPNS</p>

        <div id="level-screen" class="screen active">
            <h3>Pilih Tingkat Kesulitan:</h3>
            <div class="menu-grid">
                <button class="btn-level btn-easy" onclick="selectLevel('easy')">🟢 MUDAH (Waktu Lebih Longgar)</button>
                <button class="btn-level btn-normal" onclick="selectLevel('normal')">🟡 NORMAL (Standar CPNS)</button>
                <button class="btn-level btn-hard" onclick="selectLevel('hard')">🔴 SULIT (Angka Lebih Menantang)</button>
            </div>
        </div>

        <div id="menu-screen" class="screen">
            <h3 id="menu-title">Pilih Mode Soal:</h3>
            <div class="menu-grid">
                <button class="btn-menu" onclick="selectMode('tambah')">➕ Penjumlahan</button>
                <button class="btn-menu" onclick="kurang" onclick="selectMode('kurang')">➖ Pengurangan</button>
                <button class="btn-menu" onclick="selectMode('kali')">✖️ Perkalian</button>
                <button class="btn-menu" onclick="selectMode('bagi')">➗ Pembagian</button>
                <button class="btn-menu btn-mix" onclick="selectMode('campur')">🔀 Operasi Campuran</button>
                <button class="btn-menu btn-story" onclick="selectMode('xy')">📊 Perbandingan Nilai X dan Y</button>
                <button class="btn-menu btn-analitis" onclick="selectMode('analitis')">🧠 Penalaran Analitis</button>
            </div>
            <button class="btn-back" onclick="backToLevel()">⬅️ Kembali Pilih Level</button>
        </div>

        <div id="practice-screen" class="screen">
            <h3 id="practice-title">Pilih Paket Latihan:</h3>
            <div class="menu-grid">
                <button class="btn-menu btn-mix" onclick="startWithPractice(1)">📝 Paket Latihan 1</button>
                <button class="btn-menu btn-story" onclick="startWithPractice(2)">📝 Paket Latihan 2</button>
                <button class="btn-menu btn-analitis" onclick="startWithPractice(3)">📝 Paket Latihan 3</button>
            </div>
            <button class="btn-back" onclick="backToMenu()">⬅️ Kembali Pilih Mode</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="info-box">Soal: <span id="question-count">1</span>/<span id="total-questions-text">20</span></div>
                <div class="info-box">Kesempatan: <span id="chances-count">2</span> 🎯</div>
                <div class="info-box">Skor: <span id="score">0</span></div>
            </div>
            
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <div id="question-box" class="question-box"></div>

            <div id="options-grid" class="options-grid"></div>

            <div id="feedback" class="feedback"></div>
        </div>

        <div id="result-screen" class="screen">
            <h2>Evaluasi Selesai! 🎉</h2>
            <div class="result-box">
                <p>Skor Akhir Kamu:</p>
                <h1 id="final-score">0</h1>
                <p id="evaluation-text"></p>
            </div>
            <button class="btn-action" onclick="restartToMain()">Main Lagi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
